<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日學測單字挑戰</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .date {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 30px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #fafafa;
            margin-bottom: 15px;
            padding: 20px;
            border-left: 6px solid #3498db;
            border-radius: 6px;
        }
        .word {
            font-size: 1.4em;
            color: #e74c3c;
            font-weight: bold;
        }
        .pos {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-left: 5px;
        }
        .meaning {
            font-size: 1.1em;
            font-weight: bold;
            margin-left: 10px;
        }
        .example-box {
            margin-top: 12px;
            background-color: #eef2f5;
            padding: 12px;
            border-radius: 6px;
        }
        .example-en {
            color: #444;
            font-style: italic;
            display: block;
            margin-bottom: 5px;
        }
        .example-zh {
            color: #666;
            font-size: 0.95em;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">準備單字中...</h1>
        <div class="date" id="date"></div>
        <ul id="vocabulary-list"></ul>
    </div>

    <script>
        // 加上時間戳記強制更新快取，避免手機讀取到舊網頁
        const fetchUrl = 'article.json?t=' + new Date().getTime();

        fetch(fetchUrl)
            .then(response => response.json())
            .then(data => {
                document.getElementById('date').innerText = data.date;
                document.getElementById('title').innerText = data.title;
                
                const vocabList = document.getElementById('vocabulary-list');
                vocabList.innerHTML = ''; 
                
                data.vocabulary.forEach(item => {
                    const li = document.createElement('li');
                    
                    // 安全檢查，確保有抓到資料
                    const transText = item.example_translation ? item.example_translation : "(未提供翻譯)";
                    
                    li.innerHTML = `
                        <span class="word">${item.word}</span> 
                        <span class="pos">(${item.part_of_speech})</span> 
                        <span class="meaning">${item.meaning}</span>
                        <div class="example-box">
                            <span class="example-en">📝 ${item.example}</span>
                            <span class="example-zh">💡 ${transText}</span>
                        </div>
                    `;
                    vocabList.appendChild(li);
                });
            })
            .catch(error => {
                console.error('Error fetching vocabulary:', error);
                document.getElementById('title').innerText = "資料載入失敗，請檢查 article.json 是否正確生成。";
            });
    </script>
</body>
</html>
