<script>
    fetch('article.json')
        .then(response => response.json())
        .then(data => {
            // 顯示日期與標題
            document.getElementById('date').innerText = data.date;
            document.getElementById('title').innerText = data.title;
            
            // 隱藏或刪除原本顯示文章內容的區塊 (如果你的 HTML 有 content 區塊的話)
            const contentDiv = document.getElementById('content');
            if(contentDiv) contentDiv.style.display = 'none';

            // 顯示 50 個單字、詞性、翻譯與例句
            const vocabList = document.getElementById('vocabulary-list');
            vocabList.innerHTML = ''; // 清空原本的內容
            
            data.vocabulary.forEach(item => {
                const li = document.createElement('li');
                li.style.marginBottom = "15px"; // 讓單字之間多一點間距
                li.innerHTML = `
                    <strong>${item.word}</strong> (${item.part_of_speech}) - ${item.meaning}
                    <br>
                    <span style="color: #555; font-style: italic;">例句：${item.example}</span>
                `;
                vocabList.appendChild(li);
            });
        })
        .catch(error => {
            console.error('Error fetching vocabulary:', error);
            document.getElementById('title').innerText = "載入失敗，請稍後再試。";
        });
</script>
